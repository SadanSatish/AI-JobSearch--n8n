databases:
  # ---------------------------------------------------------------------------
  # Database: Render Managed PostgreSQL
  # ---------------------------------------------------------------------------
  - name: jsp-postgres
    plan: starter
    databaseName: jobsearch
    user: jobsearch_user
    ipAllowList: [] # default to all if internal

services:
  # ---------------------------------------------------------------------------
  # Redis: Render Key-Value Store
  # ---------------------------------------------------------------------------
  - type: keyvalue
    name: jsp-redis
    plan: starter
    ipAllowList: [] # default to all if internal
    maxmemoryPolicy: allkeys-lru

  # ---------------------------------------------------------------------------
  # Backend Orchestrator: n8n Web Service
  # ---------------------------------------------------------------------------
  - type: web
    name: jsp-n8n
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.n8n
    plan: standard
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 10
    envVars:
      # Database connection (n8n internal)
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: jsp-postgres
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: jsp-postgres
          property: port
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: jsp-postgres
          property: database
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: jsp-postgres
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: jsp-postgres
          property: password

      # Application Database connection (platform data)
      - key: APP_DB_HOST
        fromDatabase:
          name: jsp-postgres
          property: host
      - key: APP_DB_PORT
        fromDatabase:
          name: jsp-postgres
          property: port
      - key: APP_DB_NAME
        fromDatabase:
          name: jsp-postgres
          property: database
      - key: APP_DB_USER
        fromDatabase:
          name: jsp-postgres
          property: user
      - key: APP_DB_PASSWORD
        fromDatabase:
          name: jsp-postgres
          property: password
      - key: APP_DB_SCHEMA
        value: public
          
      # Redis connection (n8n Bull Queue)
      # Render Key-Value does not natively expose host/port via Blueprint properties.
      # You must manually copy the internal host and port from your Render Dashboard.
      - key: QUEUE_BULL_REDIS_HOST
        sync: false
      - key: QUEUE_BULL_REDIS_PORT
        sync: false

      # Redis Cache (Application Layer)
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_DB
        value: "0"

      # Qdrant Cloud connection
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false

      # n8n Configuration
      - key: N8N_HOST
        fromService:
          type: web
          name: jsp-n8n
          property: host
      - key: WEBHOOK_URL
        value: "https://jsp-n8n.onrender.com"
      - key: N8N_PROTOCOL
        value: https
      - key: NODE_ENV
        value: production
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: EXECUTIONS_DATA_SAVE_ON_ERROR
        value: all
      - key: EXECUTIONS_DATA_SAVE_ON_SUCCESS
        value: none
      - key: EXECUTIONS_DATA_SAVE_ON_PROGRESS
        value: false
      - key: N8N_DEFAULT_BINARY_DATA_MODE
        value: filesystem
        
      # Authentication & Security
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: "admin"
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      - key: ENCRYPTION_KEY_PII
        sync: false
      - key: API_BEARER_TOKEN
        sync: false
        
      # API Keys (To be provided in the Render Dashboard)
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
        
      # Storage & Notifications (To be provided in the Render Dashboard)
      - key: STORAGE_PROVIDER
        value: "local"
      - key: S3_BUCKET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  # ---------------------------------------------------------------------------
  # Frontend: React/Vite Static Site
  # ---------------------------------------------------------------------------
  - type: web
    name: jsp-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    previews:
      generation: automatic
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://jsp-n8n.onrender.com"
      - key: NODE_VERSION
        value: "22"
