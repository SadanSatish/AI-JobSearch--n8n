version: "3.8"

# =============================================================================
# AI Job & Internship Search Platform — Docker Compose Stack
# Version: 1.0.0
# Services: n8n · PostgreSQL 16 · Redis 7 · Qdrant · pgAdmin (dev only)
# Usage:
#   Development:  docker compose --profile dev up -d
#   Production:   docker compose up -d
# =============================================================================

name: job-search-platform

services:

  # ---------------------------------------------------------------------------
  # n8n — Workflow Orchestrator
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: jsp-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # Core n8n settings
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_LOG_LEVEL=${APP_LOG_LEVEL:-info}
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_DEFAULT_METRICS=true
      - N8N_PUSH_BACKEND=websocket
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      - EXECUTIONS_DATA_MAX_AGE=720

      # Auth
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}

      # Database backend for n8n itself
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${DB_NAME:-jobsearch}
      - DB_POSTGRESDB_USER=${DB_USER:-jobsearch_user}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - DB_POSTGRESDB_SCHEMA=n8n

      # Redis queue (scales execution workers)
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - QUEUE_BULL_REDIS_DB=1

      # -----------------------------------------------------------------------
      # LLM API Keys — passed through to all workflows
      # -----------------------------------------------------------------------
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # -----------------------------------------------------------------------
      # Model Assignments
      # -----------------------------------------------------------------------
      - MODEL_RESUME_PARSING=${MODEL_RESUME_PARSING:-google/gemini-flash-1.5}
      - MODEL_CAREER_GOAL=${MODEL_CAREER_GOAL:-anthropic/claude-haiku-3}
      - MODEL_JOB_QUALITY=${MODEL_JOB_QUALITY:-google/gemini-flash-1.5}
      - MODEL_GHOST_DETECTION=${MODEL_GHOST_DETECTION:-google/gemini-flash-1.5}
      - MODEL_SCAM_DETECTION=${MODEL_SCAM_DETECTION:-anthropic/claude-haiku-3}
      - MODEL_ATS_MATCHING=${MODEL_ATS_MATCHING:-google/gemini-flash-1.5}
      - MODEL_RESUME_REFINEMENT=${MODEL_RESUME_REFINEMENT:-anthropic/claude-3-5-sonnet}
      - MODEL_COVER_LETTER=${MODEL_COVER_LETTER:-anthropic/claude-3-5-sonnet}
      - MODEL_EMBEDDING=${MODEL_EMBEDDING:-openai/text-embedding-3-small}
      - MODEL_FALLBACK=${MODEL_FALLBACK:-meta-llama/llama-3.1-8b-instruct}

      # -----------------------------------------------------------------------
      # Application Database (platform data — different schema from n8n schema)
      # -----------------------------------------------------------------------
      - APP_DB_HOST=postgres
      - APP_DB_PORT=5432
      - APP_DB_NAME=${DB_NAME:-jobsearch}
      - APP_DB_USER=${DB_USER:-jobsearch_user}
      - APP_DB_PASSWORD=${DB_PASSWORD}
      - APP_DB_SCHEMA=public

      # -----------------------------------------------------------------------
      # Redis Cache (application layer)
      # -----------------------------------------------------------------------
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0

      # -----------------------------------------------------------------------
      # Qdrant Vector Store
      # -----------------------------------------------------------------------
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION_JOBS=${QDRANT_COLLECTION_JOBS:-jobs}
      - QDRANT_COLLECTION_RESUMES=${QDRANT_COLLECTION_RESUMES:-resumes}
      - QDRANT_COLLECTION_COMPANIES=${QDRANT_COLLECTION_COMPANIES:-companies}

      # -----------------------------------------------------------------------
      # Storage
      # -----------------------------------------------------------------------
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - STORAGE_LOCAL_PATH=/home/node/storage
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}

      # -----------------------------------------------------------------------
      # Job Board APIs
      # -----------------------------------------------------------------------
      - SERPAPI_KEY=${SERPAPI_KEY:-}
      - ADZUNA_APP_ID=${ADZUNA_APP_ID:-}
      - ADZUNA_APP_KEY=${ADZUNA_APP_KEY:-}
      - RAPIDAPI_KEY=${RAPIDAPI_KEY:-}

      # -----------------------------------------------------------------------
      # Notifications
      # -----------------------------------------------------------------------
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - NOTIFICATION_FROM_EMAIL=${NOTIFICATION_FROM_EMAIL:-noreply@jobplatform.local}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}

      # -----------------------------------------------------------------------
      # Pipeline Runtime Settings
      # -----------------------------------------------------------------------
      - PIPELINE_VERSION=${PIPELINE_VERSION:-1.0.0}
      - PIPELINE_MAX_JOBS=${PIPELINE_MAX_JOBS:-20}
      - PIPELINE_ATS_THRESHOLD=${PIPELINE_ATS_THRESHOLD:-60}
      - PIPELINE_GHOST_THRESHOLD=${PIPELINE_GHOST_THRESHOLD:-70}
      - PIPELINE_SCAM_THRESHOLD=${PIPELINE_SCAM_THRESHOLD:-70}
      - PIPELINE_COVER_LETTER_TOP_N=${PIPELINE_COVER_LETTER_TOP_N:-5}

      # -----------------------------------------------------------------------
      # Cache TTLs (seconds)
      # -----------------------------------------------------------------------
      - CACHE_TTL_JOBS=${CACHE_TTL_JOBS:-21600}
      - CACHE_TTL_COMPANIES=${CACHE_TTL_COMPANIES:-259200}
      - CACHE_TTL_EMBEDDINGS=${CACHE_TTL_EMBEDDINGS:-604800}
      - CACHE_TTL_ATS=${CACHE_TTL_ATS:-86400}
      - CACHE_TTL_LLM=${CACHE_TTL_LLM:-86400}

      # -----------------------------------------------------------------------
      # Retry Configuration
      # -----------------------------------------------------------------------
      - RETRY_LLM_MAX=${RETRY_LLM_MAX:-3}
      - RETRY_LLM_BACKOFF_MS=${RETRY_LLM_BACKOFF_MS:-1000}
      - RETRY_API_MAX=${RETRY_API_MAX:-2}
      - RETRY_API_BACKOFF_MS=${RETRY_API_BACKOFF_MS:-5000}
      - RETRY_DB_MAX=${RETRY_DB_MAX:-3}

      # -----------------------------------------------------------------------
      # Security
      # -----------------------------------------------------------------------
      - ENCRYPTION_KEY_PII=${ENCRYPTION_KEY_PII}
      - RATE_LIMIT_REQUESTS_PER_MIN=${RATE_LIMIT_REQUESTS_PER_MIN:-30}

      # -----------------------------------------------------------------------
      # Application Metadata
      # -----------------------------------------------------------------------
      - APP_ENV=${APP_ENV:-development}
      - APP_VERSION=${APP_VERSION:-1.0.0}

    volumes:
      - n8n_data:/home/node/.n8n
      - ./storage:/home/node/storage
      - ./workflows:/home/node/workflows:ro
      - ./prompts:/home/node/prompts:ro
      - ./config:/home/node/config:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: jsp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-jobsearch}
      POSTGRES_USER: ${DB_USER:-jobsearch_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "log_min_duration_statement=1000"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jobsearch_user} -d ${DB_NAME:-jobsearch}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7 — Cache + Queue Broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jsp-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Qdrant — Vector Store
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: jsp-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - ./docker/qdrant/config.yaml:/qdrant/config/production.yaml:ro
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # pgAdmin — Database GUI (dev profile only)
  # Usage: docker compose --profile dev up -d
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jsp-pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - backend
    depends_on:
      - postgres

# =============================================================================
# Networks
# =============================================================================
networks:
  backend:
    driver: bridge
    name: jsp-backend-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  n8n_data:
    name: jsp-n8n-data
  postgres_data:
    name: jsp-postgres-data
  redis_data:
    name: jsp-redis-data
  qdrant_data:
    name: jsp-qdrant-data
  pgadmin_data:
    name: jsp-pgadmin-data
